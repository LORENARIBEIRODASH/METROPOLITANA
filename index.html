<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel Operacional</title>

<style>

body{
    font-family:Arial;
    background:#f3f3f3;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.cards{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h2{
    margin:0;
    font-size:40px;
}

.card p{
    margin-top:10px;
    color:#555;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-bottom:40px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

th{
    background:#111;
    color:white;
    padding:10px;
    font-size:14px;
}

td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
    font-size:13px;
}

.base{
    background:#dbeeff;
    font-weight:bold;
}

.total{
    background:#d9edf7;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Painel Operacional</h1>

<div class="cards">

<div class="card">
<h2 id="prefixosAlocados">0</h2>
<p>Quantidade de Prefixos Alocados</p>
</div>

<div class="card">
<h2 id="servicosRecentes">0</h2>
<p>Serviços vencendo na data mais recente</p>
<small id="dataMaisRecente"></small>
</div>

</div>

<h2>Resumo por Prefixo</h2>

<div id="tabelaPrefixos"></div>

<h2>Resumo Geral por Base</h2>

<div id="tabelaBases"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFuHM9sJ5f7HSNY-qXVmgO-zKFTSG9rn9bAn_xUfXgT3IFBi5qtSiVmn3rH9oO1k5hTgPpAmB58z3/pub?output=csv";

fetch(url)
.then(r => r.text())
.then(data => {

const linhas = data.split("\n").map(l => l.split(","));

let datas = [];
let resumoPrefixo = {};
let resumoBase = {};

let prefixos = new Set();

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = (linha[3] || "").trim().split(" ")[0];
let prefixo = (linha[7] || "").trim();
let base = (linha[12] || "").trim();
let situacao = (linha[9] || "").trim().toLowerCase();

if(!situacao.includes("atribu")){
    continue;
}

if(!dataLimite || !prefixo || !base){
    continue;
}

prefixos.add(prefixo);

if(!datas.includes(dataLimite)){
    datas.push(dataLimite);
}

if(!resumoPrefixo[base]){
    resumoPrefixo[base] = {};
}

if(!resumoPrefixo[base][prefixo]){
    resumoPrefixo[base][prefixo] = {};
}

if(!resumoPrefixo[base][prefixo][dataLimite]){
    resumoPrefixo[base][prefixo][dataLimite] = 0;
}

resumoPrefixo[base][prefixo][dataLimite]++;

if(!resumoBase[base]){
    resumoBase[base] = {};
}

if(!resumoBase[base][dataLimite]){
    resumoBase[base][dataLimite] = 0;
}

resumoBase[base][dataLimite]++;

}

datas.sort((a,b)=>{

let pa = a.split("/");
let pb = b.split("/");

return new Date(pa[2], pa[1]-1, pa[0]) -
new Date(pb[2], pb[1]-1, pb[0]);

});

const dataMaisRecente = datas[datas.length - 1];

document.getElementById("dataMaisRecente").innerText =
"Data: " + dataMaisRecente;

let totalRecentes = 0;

for(let base in resumoBase){

totalRecentes += resumoBase[base][dataMaisRecente] || 0;

}

document.getElementById("servicosRecentes").innerText =
totalRecentes;

document.getElementById("prefixosAlocados").innerText =
prefixos.size;





/* ===========================
TABELA PREFIXOS
=========================== */

let html = "<table>";

html += "<tr>";
html += "<th>Prefixo</th>";

datas.forEach(d=>{
html += `<th>${d}</th>`;
});

html += "<th>Total Geral</th>";
html += "</tr>";

for(let base in resumoPrefixo){

html += `
<tr class="base">
<td colspan="${datas.length + 2}">
${base}
</td>
</tr>
`;

for(let prefixo in resumoPrefixo[base]){

let total = 0;

html += `<tr><td>${prefixo}</td>`;

datas.forEach(data=>{

let qtd =
resumoPrefixo[base][prefixo][data] || 0;

total += qtd;

html += `<td>${qtd}</td>`;

});

html += `<td class="total">${total}</td></tr>`;

}

}

html += "</table>";

document.getElementById("tabelaPrefixos").innerHTML =
html;





/* ===========================
TABELA BASES
=========================== */

let htmlBase = "<table>";

htmlBase += "<tr>";
htmlBase += "<th>Base</th>";

datas.forEach(d=>{
htmlBase += `<th>${d}</th>`;
});

htmlBase += "<th>Total Geral</th>";
htmlBase += "</tr>";

for(let base in resumoBase){

let total = 0;

htmlBase += `<tr><td>${base}</td>`;

datas.forEach(data=>{

let qtd =
resumoBase[base][data] || 0;

total += qtd;

htmlBase += `<td>${qtd}</td>`;

});

htmlBase += `<td class="total">${total}</td></tr>`;

}

htmlBase += "</table>";

document.getElementById("tabelaBases").innerHTML =
htmlBase;

});

</script>

</body>
</html>
