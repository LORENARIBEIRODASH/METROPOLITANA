<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

const url =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFuHM9sJ5f7HSNY-qXVmgO-zKFTSG9rn9bAn_xUfXgT3IFBi5qtSiVmn3rH9oO1k5hTgPpAmB58z3/pub?output=csv";

function fiscalDaBase(base){

base = String(base).trim();

if(["19","24","51","66","92"].includes(base)){
    return "IVAN";
}

if(["71","50","61","52"].includes(base)){
    return "RAFAEL";
}

if(["09","10","20","21","22","18"].includes(base)){
    return "LUIS";
}

return "OUTROS";

}

function ordenarData(a,b){

const pa = a.split("/");
const pb = b.split("/");

return new Date(pa[2],pa[1]-1,pa[0]) -
new Date(pb[2],pb[1]-1,pb[0]);

}

Papa.parse(url, {

download:true,
header:true,

complete:function(results){

const linhas = results.data;

let datas = [];
let prefixos = new Set();
let totalServicos = 0;

let prefixosFiscal = {
    IVAN:{},
    RAFAEL:{},
    LUIS:{}
};

let resumoDias = {};
let servicosMaisRecentes = {};

linhas.forEach(linha => {

let dataLimite =
(linha["Data Limite"] || "").trim().split(" ")[0];

let prefixo =
(linha["Prefixo"] || "").trim();

let situacao =
(linha["Situação"] || "").trim().toLowerCase();

let base =
(linha["Base"] || "").trim();

if(
!dataLimite ||
!prefixo ||
!base
){
    return;
}

if(!situacao.includes("atribu")){
    return;
}

totalServicos++;

prefixos.add(prefixo);

if(!datas.includes(dataLimite)){
    datas.push(dataLimite);
}

let fiscal = fiscalDaBase(base);

if(!prefixosFiscal[fiscal][base]){
    prefixosFiscal[fiscal][base] = new Set();
}

prefixosFiscal[fiscal][base].add(prefixo);

if(!resumoDias[base]){
    resumoDias[base] = {};
}

if(!resumoDias[base][dataLimite]){
    resumoDias[base][dataLimite] = 0;
}

resumoDias[base][dataLimite]++;

});

datas.sort(ordenarData);

const dataMaisRecente = datas[0];

document.getElementById("dataMaisRecente").innerText =
"Data: " + dataMaisRecente;

document.getElementById("prefixos").innerText =
prefixos.size;

document.getElementById("totalServicos").innerText =
totalServicos;

/* SERVICOS MAIS PROXIMOS */

let totalHoje = 0;

linhas.forEach(linha => {

let dataLimite =
(linha["Data Limite"] || "").trim().split(" ")[0];

let prefixo =
(linha["Prefixo"] || "").trim();

let situacao =
(linha["Situação"] || "").trim().toLowerCase();

if(
situacao.includes("atribu") &&
dataLimite === dataMaisRecente
){

totalHoje++;

if(!servicosMaisRecentes[prefixo]){
    servicosMaisRecentes[prefixo] = 0;
}

servicosMaisRecentes[prefixo]++;

}

});

document.getElementById("servicosHoje").innerText =
totalHoje;

/* PREFIXOS */

let htmlFiscal = "";

["IVAN","RAFAEL","LUIS"].forEach(fiscal => {

htmlFiscal += `
<h3>${fiscal}</h3>

<table>

<tr>
<th>Base</th>
<th>Prefixos</th>
</tr>
`;

for(let base in prefixosFiscal[fiscal]){

htmlFiscal += `
<tr>
<td>${base}</td>
<td>
${Array.from(prefixosFiscal[fiscal][base]).join(" / ")}
</td>
</tr>
`;

}

htmlFiscal += "</table>";

});

document.getElementById("prefixosFiscal").innerHTML =
htmlFiscal;

/* MAIS RECENTES */

let htmlRecentes = `
<table>

<tr>
<th>Prefixo</th>
<th>Quantidade</th>
<th>Data Limite</th>
</tr>
`;

for(let prefixo in servicosMaisRecentes){

htmlRecentes += `
<tr>
<td>${prefixo}</td>
<td>${servicosMaisRecentes[prefixo]}</td>
<td>${dataMaisRecente}</td>
</tr>
`;

}

htmlRecentes += "</table>";

document.getElementById("servicosRecentes").innerHTML =
htmlRecentes;

/* 5 DIAS */

let proximasDatas = datas.slice(0,5);

let htmlDias = "<table>";

htmlDias += "<tr><th>Base</th>";

proximasDatas.forEach(data => {

htmlDias += `<th>${data}</th>`;

});

htmlDias += "<th>Total</th></tr>";

let totaisColuna = {};

proximasDatas.forEach(data => {
totaisColuna[data] = 0;
});

for(let base in resumoDias){

let totalLinha = 0;

htmlDias += `<tr><td>${base}</td>`;

proximasDatas.forEach(data => {

let qtd = resumoDias[base][data] || 0;

totaisColuna[data] += qtd;

totalLinha += qtd;

htmlDias += `<td>${qtd}</td>`;

});

htmlDias += `
<td class="total">
${totalLinha}
</td>
</tr>
`;

}

htmlDias += `<tr class="total"><td>TOTAL</td>`;

let totalGeral = 0;

proximasDatas.forEach(data => {

totalGeral += totaisColuna[data];

htmlDias += `
<td class="total">
${totaisColuna[data]}
</td>
`;

});

htmlDias += `
<td class="total">
${totalGeral}
</td>
`;

htmlDias += "</tr>";

htmlDias += "</table>";

document.getElementById("proximosDias").innerHTML =
htmlDias;

}

});

</script>
