<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel Dinâmico</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:40px;
    background:white;
}

th{
    background:#000;
    color:white;
    padding:10px;
    font-size:14px;
}

td{
    padding:8px;
    border:1px solid #ddd;
    text-align:center;
}

.base{
    background:#d9edf7;
    font-weight:bold;
}

.prefixo{
    background:#f9f9f9;
}

.total{
    background:#eee;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Resumo Geral por Base</h1>

<div id="resumo"></div>

<h1>Detalhamento por Prefixo</h1>

<div id="detalhamento"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFuHM9sJ5f7HSNY-qXVmgO-zKFTSG9rn9bAn_xUfXgT3IFBi5qtSiVmn3rH9oO1k5hTgPpAmB58z3/pub?output=csv";

fetch(url)
.then(r => r.text())
.then(data => {

const linhas = data.split("\n").map(l => l.split(","));

let datas = [];
let resumo = {};
let detalhamento = {};

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = (linha[3] || "").split(" ")[0];
let prefixo = linha[7] || "SEM PREFIXO";
let base = linha[12] || "SEM BASE";

if(!dataLimite) continue;

if(!datas.includes(dataLimite)){
    datas.push(dataLimite);
}

if(!resumo[base]){
    resumo[base] = {};
}

if(!resumo[base][dataLimite]){
    resumo[base][dataLimite] = 0;
}

resumo[base][dataLimite]++;

if(!detalhamento[base]){
    detalhamento[base] = {};
}

if(!detalhamento[base][prefixo]){
    detalhamento[base][prefixo] = {};
}

if(!detalhamento[base][prefixo][dataLimite]){
    detalhamento[base][prefixo][dataLimite] = 0;
}

detalhamento[base][prefixo][dataLimite]++;

}

datas.sort((a,b)=>{

let pa = a.split("/");
let pb = b.split("/");

return new Date(pa[2], pa[1]-1, pa[0]) -
new Date(pb[2], pb[1]-1, pb[0]);

});

let resumoHTML = "<table>";

resumoHTML += "<tr><th>Base</th>";

datas.forEach(d=>{
resumoHTML += `<th>${d}</th>`;
});

resumoHTML += "<th>Total</th></tr>";

for(let base in resumo){

let total = 0;

resumoHTML += `<tr class="base"><td>${base}</td>`;

datas.forEach(d=>{

let qtd = resumo[base][d] || 0;

total += qtd;

resumoHTML += `<td>${qtd}</td>`;

});

resumoHTML += `<td>${total}</td></tr>`;

}

resumoHTML += "</table>";

document.getElementById("resumo").innerHTML = resumoHTML;

let detalhamentoHTML = "<table>";

detalhamentoHTML += "<tr><th>Base</th><th>Prefixo</th>";

datas.forEach(d=>{
detalhamentoHTML += `<th>${d}</th>`;
});

detalhamentoHTML += "<th>Total</th></tr>";

for(let base in detalhamento){

for(let prefixo in detalhamento[base]){

let total = 0;

detalhamentoHTML += `
<tr class="prefixo">
<td>${base}</td>
<td>${prefixo}</td>
`;

datas.forEach(d=>{

let qtd = detalhamento[base][prefixo][d] || 0;

total += qtd;

detalhamentoHTML += `<td>${qtd}</td>`;

});

detalhamentoHTML += `<td>${total}</td></tr>`;

}

}

detalhamentoHTML += "</table>";

document.getElementById("detalhamento").innerHTML = detalhamentoHTML;

});

</script>

</body>
</html>
