<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel Operacional</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

h2{
    margin-top:40px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
    margin:0;
    font-size:35px;
}

.card p{
    margin-top:10px;
    color:#666;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-bottom:30px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th{
    background:#000;
    color:white;
    padding:10px;
    font-size:14px;
}

td{
    padding:8px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f9f9f9;
}

.base{
    background:#d9edf7;
    font-weight:bold;
}

.prefixo{
    background:#fff3cd;
}

.detalhe{
    background:#fff;
}

</style>

</head>

<body>

<h1>Painel Operacional</h1>

<div class="cards">

<div class="card">
<h3 id="servicosHoje">0</h3>
<p>Serviços vencendo na data mais recente</p>
</div>

<div class="card">
<h3 id="equipesAtribuidas">0</h3>
<p>Total de equipes atribuídas</p>
</div>

<div class="card">
<h3 id="basesAtribuidas">0</h3>
<p>Total de bases atribuídas</p>
</div>

<div class="card">
<h3 id="totalServicos">0</h3>
<p>Total geral de serviços atribuídos</p>
</div>

</div>

<h2>Resumo Geral por Base</h2>

<div id="resumoBase"></div>

<h2>Resumo Dinâmico por Data</h2>

<div id="resumoDinamico"></div>

<h2>Serviços da Data Mais Recente por Equipe</h2>

<div id="detalhamento"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFuHM9sJ5f7HSNY-qXVmgO-zKFTSG9rn9bAn_xUfXgT3IFBi5qtSiVmn3rH9oO1k5hTgPpAmB58z3/pub?output=csv";

fetch(url)
.then(r => r.text())
.then(data => {

const linhas = data.split("\n").map(l => l.split(","));

let datas = [];
let resumo = {};
let equipes = new Set();
let bases = new Set();

let detalhamento = {};

let totalServicos = 0;

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = (linha[3] || "").trim().split(" ")[0];
let tipoServico = (linha[5] || "").trim();
let prefixo = (linha[7] || "").trim();
let situacao = (linha[9] || "").trim().toLowerCase();
let base = (linha[12] || "").trim();

if(!situacao.includes("atribu")){
    continue;
}

if(!dataLimite) continue;

if(!datas.includes(dataLimite)){
    datas.push(dataLimite);
}

equipes.add(prefixo);
bases.add(base);

totalServicos++;

if(!resumo[base]){
    resumo[base] = {};
}

if(!resumo[base][dataLimite]){
    resumo[base][dataLimite] = 0;
}

resumo[base][dataLimite]++;

}

datas.sort((a,b)=>{

let pa = a.split("/");
let pb = b.split("/");

return new Date(pa[2], pa[1]-1, pa[0]) -
new Date(pb[2], pb[1]-1, pb[0]);

});

const dataMaisRecente = datas[datas.length - 1];

let servicosHoje = 0;

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = (linha[3] || "").trim().split(" ")[0];
let tipoServico = (linha[5] || "").trim();
let prefixo = (linha[7] || "").trim();
let situacao = (linha[9] || "").trim().toLowerCase();
let base = (linha[12] || "").trim();

if(
situacao.includes("atribu") &&
dataLimite === dataMaisRecente
){

servicosHoje++;

if(!detalhamento[prefixo]){
    detalhamento[prefixo] = [];
}

detalhamento[prefixo].push({
tipo: tipoServico,
data: dataLimite,
base: base
});

}

}

document.getElementById("servicosHoje").innerText = servicosHoje;
document.getElementById("equipesAtribuidas").innerText = equipes.size;
document.getElementById("basesAtribuidas").innerText = bases.size;
document.getElementById("totalServicos").innerText = totalServicos;

let resumoHTML = "<table>";

resumoHTML += `
<tr>
<th>Base</th>
<th>Data</th>
<th>Quantidade</th>
</tr>
`;

for(let base in resumo){

for(let data in resumo[base]){

resumoHTML += `
<tr class="base">
<td>${base}</td>
<td>${data}</td>
<td>${resumo[base][data]}</td>
</tr>
`;

}

}

resumoHTML += "</table>";

document.getElementById("resumoBase").innerHTML = resumoHTML;

let dinamicoHTML = "<table>";

dinamicoHTML += "<tr><th>Base</th>";

datas.forEach(d=>{
dinamicoHTML += `<th>${d}</th>`;
});

dinamicoHTML += "<th>Total</th></tr>";

for(let base in resumo){

let total = 0;

dinamicoHTML += `<tr><td>${base}</td>`;

datas.forEach(d=>{

let qtd = resumo[base][d] || 0;

total += qtd;

dinamicoHTML += `<td>${qtd}</td>`;

});

dinamicoHTML += `<td><strong>${total}</strong></td></tr>`;

}

dinamicoHTML += "</table>";

document.getElementById("resumoDinamico").innerHTML = dinamicoHTML;

let detalheHTML = "";

for(let prefixo in detalhamento){

detalheHTML += `
<table>

<tr class="prefixo">
<th colspan="3">${prefixo}</th>
</tr>

<tr>
<th>Tipo Serviço</th>
<th>Data Limite</th>
<th>Base</th>
</tr>
`;

detalhamento[prefixo].forEach(servico=>{

detalheHTML += `
<tr class="detalhe">
<td>${servico.tipo}</td>
<td>${servico.data}</td>
<td>${servico.base}</td>
</tr>
`;

});

detalheHTML += "</table>";

}

document.getElementById("detalhamento").innerHTML = detalheHTML;

});

</script>

</body>
</html>
