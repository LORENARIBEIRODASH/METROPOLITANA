<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel Operacional Automático</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    text-align:center;
}

.card h2{
    margin:0;
    font-size:35px;
}

.card p{
    margin-top:10px;
    color:#666;
}

.container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#000;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

.base-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.base-item{
    padding:10px 0;
    border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<h1>Painel Operacional Automático</h1>

<div class="cards">

<div class="card">
<h2 id="vencendoHoje">0</h2>
<p>Serviços vencendo hoje</p>
</div>

<div class="card">
<h2 id="atribuidos">0</h2>
<p>Total atribuídos</p>
</div>

<div class="card">
<h2 id="trabalhando">0</h2>
<p>Equipes trabalhando</p>
</div>

<div class="card">
<h2 id="deslocando">0</h2>
<p>Deslocando / Local</p>
</div>

</div>

<div class="container">

<div>

<table>

<thead>

<tr>
<th>Base</th>
<th>Prefixo</th>
<th>Vence Hoje</th>
<th>Situação</th>
<th>Tempo</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<div>

<div class="base-box">

<h3>Vencendo Hoje por Base</h3>

<div id="bases"></div>

</div>

</div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFuHM9sJ5f7HSNY-qXVmgO-zKFTSG9rn9bAn_xUfXgT3IFBi5qtSiVmn3rH9oO1k5hTgPpAmB58z3/pub?output=csv";

fetch(url)
.then(response => response.text())
.then(data => {

const linhas = data.split("\n").map(l => l.split(","));

const tabela = document.getElementById("tabela");

let hoje = new Date().toLocaleDateString('pt-BR');

let vencendoHoje = 0;
let atribuidos = 0;
let trabalhando = 0;
let deslocando = 0;

let bases = {};

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = linha[3] || "";
let prefixo = linha[7] || "";
let situacao = linha[10] || "";
let tempo = linha[11] || "";
let base = linha[12] || "";

let venceHoje = dataLimite.includes(hoje);

if(venceHoje){
    vencendoHoje++;
}

if(situacao.toLowerCase().includes("atribu")){
    atribuidos++;
}

if(situacao.toLowerCase().includes("trabalhando")){
    trabalhando++;
}

if(
situacao.toLowerCase().includes("deslocando") ||
situacao.toLowerCase().includes("local")
){
    deslocando++;
}

if(!bases[base]){
    bases[base] = 0;
}

if(venceHoje){
    bases[base]++;
}

tabela.innerHTML += `
<tr>
<td>${base}</td>
<td>${prefixo}</td>
<td>${venceHoje ? "SIM" : "NÃO"}</td>
<td>${situacao}</td>
<td>${tempo}</td>
</tr>
`;

}

document.getElementById("vencendoHoje").innerText = vencendoHoje;
document.getElementById("atribuidos").innerText = atribuidos;
document.getElementById("trabalhando").innerText = trabalhando;
document.getElementById("deslocando").innerText = deslocando;

let basesHTML = "";

for(let base in bases){

basesHTML += `
<div class="base-item">
<strong>${base}</strong><br>
${bases[base]} vencendo hoje
</div>
`;

}

document.getElementById("bases").innerHTML = basesHTML;

});

</script>

</body>
</html>
