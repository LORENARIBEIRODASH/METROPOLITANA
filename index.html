<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel de Serviços</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    padding:40px;
}

h1{
    color:#222;
}

table{
    width:100%;
    background:white;
    border-collapse: collapse;
    margin-top:20px;
}

th, td{
    padding:15px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#111;
    color:white;
}

.alto{
    color:red;
    font-weight:bold;
}

.medio{
    color:orange;
    font-weight:bold;
}

.baixo{
    color:green;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Painel de Serviços Prioritários</h1>

<table>

<tr>
<th>Base</th>
<th>Equipe</th>
<th>Quantidade de Serviços</th>
<th>Prioridade</th>
</tr>

<tr>
<td>Formosa</td>
<td>Equipe Norte</td>
<td>18</td>
<td class="alto">Alta</td>
</tr>

<tr>
<td>Brasília</td>
<td>Equipe Sul</td>
<td>9</td>
<td class="medio">Média</td>
</tr>

<tr>
<td>Goiânia</td>
<td>Equipe Centro</td>
<td>3</td>
<td class="baixo">Baixa</td>
</tr>

</table>

</body>
</html>
