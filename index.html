<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel Operacional</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

h2{
    margin-top:40px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
    margin:0;
    font-size:35px;
}

.card p{
    margin-top:10px;
    color:#666;
}

.card small{
    display:block;
    margin-top:10px;
    line-height:1.6;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th{
    background:#000;
    color:white;
    padding:10px;
    font-size:14px;
}

td{
    padding:8px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f9f9f9;
}

.total{
    background:#d9edf7;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>Painel Operacional</h1>

<div class="cards">

<div class="card">
<h3 id="servicosData">0</h3>
<p>Serviços vencendo na data mais recente</p>
<small id="dataMaisRecente"></small>
</div>

<div class="card">
<h3 id="equipesAtribuidas">0</h3>
<p>Total de equipes atribuídas</p>
</div>

<div class="card">
<h3 id="basesAtribuidas">0</h3>
<p>Total de equipes por base</p>

<small id="listaBases"></small>
</div>

<div class="card">
<h3 id="totalServicos">0</h3>
<p>Total geral de serviços atribuídos</p>
</div>

</div>

<h2>Resumo Geral por Base</h2>

<div id="resumoBase"></div>

<h2>Serviços da Data Mais Recente</h2>

<div id="servicosRecentes"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFuHM9sJ5f7HSNY-qXVmgO-zKFTSG9rn9bAn_xUfXgT3IFBi5qtSiVmn3rH9oO1k5hTgPpAmB58z3/pub?output=csv";

fetch(url)
.then(r => r.text())
.then(data => {

const linhas = data.split("\n").map(l => l.split(","));

let datas = [];
let resumo = {};
let bases = {};
let prefixos = new Set();

let totalServicos = 0;

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = (linha[3] || "").trim().split(" ")[0];
let prefixo = (linha[7] || "").trim();
let situacao = (linha[9] || "").trim().toLowerCase();
let base = (linha[12] || "").trim();

if(!situacao.includes("atribu")){
    continue;
}

if(!dataLimite) continue;

if(!datas.includes(dataLimite)){
    datas.push(dataLimite);
}

prefixos.add(prefixo);

totalServicos++;

if(!resumo[base]){
    resumo[base] = {};
}

if(!resumo[base][dataLimite]){
    resumo[base][dataLimite] = 0;
}

resumo[base][dataLimite]++;

if(!bases[base]){
    bases[base] = new Set();
}

bases[base].add(prefixo);

}

datas.sort((a,b)=>{

let pa = a.split("/");
let pb = b.split("/");

return new Date(pa[2], pa[1]-1, pa[0]) -
new Date(pb[2], pb[1]-1, pb[0]);

});

const dataMaisRecente = datas[datas.length - 1];

document.getElementById("dataMaisRecente").innerText =
"Data: " + dataMaisRecente;

let servicosMaisRecentes = 0;

let recentes = {};

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = (linha[3] || "").trim().split(" ")[0];
let prefixo = (linha[7] || "").trim();
let situacao = (linha[9] || "").trim().toLowerCase();

if(
situacao.includes("atribu") &&
dataLimite === dataMaisRecente
){

servicosMaisRecentes++;

if(!recentes[prefixo]){
    recentes[prefixo] = 0;
}

recentes[prefixo]++;

}

}

document.getElementById("servicosData").innerText =
servicosMaisRecentes;

document.getElementById("equipesAtribuidas").innerText =
prefixos.size;

document.getElementById("basesAtribuidas").innerText =
Object.keys(bases).length;

document.getElementById("totalServicos").innerText =
totalServicos;

let basesHTML = "";

for(let base in bases){

basesHTML += `
<strong>${base}</strong><br>
${bases[base].size} equipes<br>
${Array.from(bases[base]).join(", ")}
<br><br>
`;

}

document.getElementById("listaBases").innerHTML =
basesHTML;

let resumoHTML = "<table>";

resumoHTML += "<tr><th>Base</th>";

datas.forEach(d=>{
resumoHTML += `<th>${d}</th>`;
});

resumoHTML += "<th>Total</th></tr>";

for(let base in resumo){

let total = 0;

resumoHTML += `<tr><td>${base}</td>`;

datas.forEach(d=>{

let qtd = resumo[base][d] || 0;

total += qtd;

resumoHTML += `<td>${qtd}</td>`;

});

resumoHTML += `<td class="total">${total}</td></tr>`;

}

resumoHTML += "</table>";

document.getElementById("resumoBase").innerHTML =
resumoHTML;

let recentesHTML = "<table>";

recentesHTML += `
<tr>
<th>Prefixo</th>
<th>Quantidade</th>
</tr>
`;

for(let prefixo in recentes){

recentesHTML += `
<tr>
<td>${prefixo}</td>
<td>${recentes[prefixo]}</td>
</tr>
`;

}

recentesHTML += "</table>";

document.getElementById("servicosRecentes").innerHTML =
recentesHTML;

});

</script>

</body>
</html>
