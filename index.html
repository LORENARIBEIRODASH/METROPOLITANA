<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel Dinâmico Operacional</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

h1{
    margin-top:40px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:40px;
    background:white;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th{
    background:#000;
    color:white;
    padding:10px;
    font-size:14px;
}

td{
    padding:8px;
    border:1px solid #ddd;
    text-align:center;
}

.base{
    background:#d9edf7;
    font-weight:bold;
}

.prefixo{
    background:#f9f9f9;
}

.total{
    background:#eee;
    font-weight:bold;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-align:center;
}

.card h2{
    margin:0;
    font-size:35px;
}

.card p{
    margin-top:10px;
    color:#666;
}

</style>

</head>

<body>

<h1>Painel Operacional</h1>

<div class="cards">

<div class="card">
<h2 id="totalServicos">0</h2>
<p>Total de Serviços</p>
</div>

<div class="card">
<h2 id="totalBases">0</h2>
<p>Total de Bases</p>
</div>

<div class="card">
<h2 id="totalPrefixos">0</h2>
<p>Total de Prefixos</p>
</div>

<div class="card">
<h2 id="totalDatas">0</h2>
<p>Total de Datas</p>
</div>

</div>

<h1>Resumo Geral por Base</h1>

<div id="resumo"></div>

<h1>Detalhamento por Prefixo</h1>

<div id="detalhamento"></div>

<h1>Data Limite por Base</h1>

<div id="vencimentos"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoFuHM9sJ5f7HSNY-qXVmgO-zKFTSG9rn9bAn_xUfXgT3IFBi5qtSiVmn3rH9oO1k5hTgPpAmB58z3/pub?output=csv";

fetch(url)
.then(r => r.text())
.then(data => {

const linhas = data.split("\n").map(l => l.split(","));

let datas = [];
let resumo = {};
let detalhamento = {};

let totalServicos = 0;

let basesSet = new Set();
let prefixosSet = new Set();

for(let i = 1; i < linhas.length; i++){

let linha = linhas[i];

let dataLimite = (linha[3] || "").split(" ")[0];
let prefixo = linha[7] || "SEM PREFIXO";
let base = linha[12] || "SEM BASE";

let quantidade = parseInt(linha[0]) || 1;

if(!dataLimite) continue;

basesSet.add(base);
prefixosSet.add(prefixo);

totalServicos += quantidade;

if(!datas.includes(dataLimite)){
    datas.push(dataLimite);
}

if(!resumo[base]){
    resumo[base] = {};
}

if(!resumo[base][dataLimite]){
    resumo[base][dataLimite] = 0;
}

resumo[base][dataLimite] += quantidade;

if(!detalhamento[base]){
    detalhamento[base] = {};
}

if(!detalhamento[base][prefixo]){
    detalhamento[base][prefixo] = {};
}

if(!detalhamento[base][prefixo][dataLimite]){
    detalhamento[base][prefixo][dataLimite] = 0;
}

detalhamento[base][prefixo][dataLimite] += quantidade;

}

datas.sort((a,b)=>{

let pa = a.split("/");
let pb = b.split("/");

return new Date(pa[2], pa[1]-1, pa[0]) -
new Date(pb[2], pb[1]-1, pb[0]);

});

document.getElementById("totalServicos").innerText = totalServicos;
document.getElementById("totalBases").innerText = basesSet.size;
document.getElementById("totalPrefixos").innerText = prefixosSet.size;
document.getElementById("totalDatas").innerText = datas.length;

let resumoHTML = "<table>";

resumoHTML += "<tr><th>Base</th>";

datas.forEach(d=>{
resumoHTML += `<th>${d}</th>`;
});

resumoHTML += "<th>Total Geral</th></tr>";

for(let base in resumo){

let total = 0;

resumoHTML += `<tr class="base"><td>${base}</td>`;

datas.forEach(d=>{

let qtd = resumo[base][d] || 0;

total += qtd;

resumoHTML += `<td>${qtd}</td>`;

});

resumoHTML += `<td>${total}</td></tr>`;

}

resumoHTML += "</table>";

document.getElementById("resumo").innerHTML = resumoHTML;

let detalhamentoHTML = "<table>";

detalhamentoHTML += "<tr><th>Base</th><th>Prefixo</th>";

datas.forEach(d=>{
detalhamentoHTML += `<th>${d}</th>`;
});

detalhamentoHTML += "<th>Total Geral</th></tr>";

for(let base in detalhamento){

for(let prefixo in detalhamento[base]){

let total = 0;

detalhamentoHTML += `
<tr class="prefixo">
<td>${base}</td>
<td>${prefixo}</td>
`;

datas.forEach(d=>{

let qtd = detalhamento[base][prefixo][d] || 0;

total += qtd;

detalhamentoHTML += `<td>${qtd}</td>`;

});

detalhamentoHTML += `<td>${total}</td></tr>`;

}

}

detalhamentoHTML += "</table>";

document.getElementById("detalhamento").innerHTML = detalhamentoHTML;

let vencHTML = "<table>";

vencHTML += "<tr><th>Base</th>";

datas.forEach(d=>{
vencHTML += `<th>${d}</th>`;
});

vencHTML += "<th>Total Geral</th></tr>";

for(let base in resumo){

let total = 0;

vencHTML += `<tr class="base"><td>${base}</td>`;

datas.forEach(d=>{

let qtd = resumo[base][d] || 0;

total += qtd;

vencHTML += `<td>${qtd}</td>`;

});

vencHTML += `<td>${total}</td></tr>`;

}

vencHTML += "</table>";

document.getElementById("vencimentos").innerHTML = vencHTML;

});

</script>

</body>
</html>
